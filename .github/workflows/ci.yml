name: ci

# Gate pull requests (and pushes to main) on the same checks we run locally:
# the frontend type-checks + builds, and the Rust backend is formatted, lints
# clean (clippy as errors), and compiles.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type-check + build
        run: npm run build

  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libdav1d-dev \
            build-essential \
            file

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --features avif -- -D warnings

      - name: Test
        run: cargo test --manifest-path src-tauri/Cargo.toml --features avif
